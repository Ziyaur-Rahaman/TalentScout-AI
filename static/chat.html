<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat — TalentScout AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
    .chat-bubble-agent {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 0 16px 16px 16px;
    }
    .chat-bubble-candidate {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px 0 16px 16px;
    }
    .typing-dot {
      width: 8px; height: 8px;
      background: #818cf8;
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* FIX: Full height layout so chat never needs page scroll */
    html, body {
      height: 100%;
      overflow: hidden;
    }
    .chat-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      scroll-behavior: smooth;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body class="gradient-bg text-white">

<div class="chat-layout max-w-2xl mx-auto w-full">

  <!-- NAV -->
  <nav class="flex justify-between items-center px-6 py-4 border-b border-white/10 flex-shrink-0">
    <div class="flex items-center gap-3">
      <button onclick="window.location.href='/candidate.html'"
        class="text-white/40 hover:text-white transition text-sm">← Back</button>
      <div class="w-px h-4 bg-white/20"></div>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-indigo-500/30 rounded-full flex items-center justify-center text-sm">🤖</div>
        <div>
          <div class="text-sm font-semibold">AI Recruiter</div>
          <div class="text-xs text-green-400" id="status-text">● Online</div>
        </div>
      </div>
    </div>
    <!-- Progress Bar -->
    <div class="flex flex-col items-end gap-1">
      <div class="text-xs text-white/40" id="progress-text">0 / 5 questions</div>
      <div class="w-24 h-1.5 bg-white/10 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-indigo-500 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>
  </nav>

  <!-- MESSAGES -->
  <div class="messages-area" id="messages"></div>

  <!-- INPUT -->
  <div class="border-t border-white/10 px-4 py-4 flex-shrink-0" id="input-area">
    <div class="flex gap-3 items-end">
      <textarea id="message-input" rows="1"
        placeholder="Type your reply..."
        class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-indigo-500 transition resize-none text-sm"
        onkeydown="handleKeyDown(event)"
        oninput="autoResize(this)"></textarea>
      <button onclick="sendMessage()"
        id="send-btn"
        class="w-12 h-12 bg-indigo-600 hover:bg-indigo-500 rounded-xl flex items-center justify-center transition flex-shrink-0 text-lg">
        ➤
      </button>
    </div>
    <div class="text-xs text-white/20 mt-2 text-center">Enter to send • Shift+Enter for new line</div>
  </div>

  <!-- COMPLETED -->
  <div id="completed-area" class="hidden border-t border-white/10 px-4 py-8 flex-shrink-0 text-center">
    <div class="text-5xl mb-3">🎉</div>
    <div class="text-xl font-bold mb-2">Chat Completed!</div>
    <div class="text-white/50 text-sm mb-6">
      Thank you for your time. The recruiter will review your responses and reach out if shortlisted.
    </div>
    <button onclick="window.location.href='/candidate.html'"
      class="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-semibold transition">
      Back to Dashboard →
    </button>
  </div>

</div>

<script>
  const token = localStorage.getItem('token')
  if (!token) window.location.href = '/login.html'

  const params = new URLSearchParams(window.location.search)
  const conversationId = params.get('id')
  if (!conversationId) window.location.href = '/candidate.html'

  let isTyping = false
  let chatCompleted = false

  function scrollToBottom() {
    const container = document.getElementById('messages')
    // Use setTimeout to ensure DOM is updated before scrolling
    setTimeout(() => {
      container.scrollTop = container.scrollHeight
    }, 50)
  }

  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 120) + 'px'
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  }

  function updateProgress(asked, max) {
    document.getElementById('progress-text').textContent = `${asked} / ${max} questions`
    const pct = (asked / max) * 100
    document.getElementById('progress-bar').style.width = pct + '%'
  }

  function addMessage(role, content) {
    const container = document.getElementById('messages')
    const isAgent = role === 'agent'

    const div = document.createElement('div')
    div.className = `flex ${isAgent ? 'justify-start' : 'justify-end'} mb-4`
    div.innerHTML = `
      <div class="max-w-xs md:max-w-md lg:max-w-lg">
        ${isAgent ? `
          <div class="flex items-center gap-2 mb-1">
            <div class="w-6 h-6 bg-indigo-500/30 rounded-full flex items-center justify-center text-xs">🤖</div>
            <span class="text-xs text-white/40">AI Recruiter</span>
          </div>` : `
          <div class="text-xs text-white/40 text-right mb-1">You</div>`
        }
        <div class="${isAgent ? 'chat-bubble-agent' : 'chat-bubble-candidate'} px-4 py-3 text-sm leading-relaxed">
          ${content}
        </div>
      </div>
    `
    container.appendChild(div)
    scrollToBottom()
  }

  function showTyping() {
    const container = document.getElementById('messages')
    const div = document.createElement('div')
    div.id = 'typing-indicator'
    div.className = 'flex justify-start mb-4'
    div.innerHTML = `
      <div class="chat-bubble-agent px-4 py-3 flex gap-1 items-center">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `
    container.appendChild(div)
    scrollToBottom()
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator')
    if (el) el.remove()
  }

  function showCompleted() {
    chatCompleted = true
    document.getElementById('input-area').classList.add('hidden')
    document.getElementById('completed-area').classList.remove('hidden')
    document.getElementById('status-text').textContent = '● Completed'
    document.getElementById('status-text').className = 'text-xs text-purple-400'
    updateProgress(5, 5)
  }

  async function initChat() {
    showTyping()
    try {
      const res = await fetch(`/api/chat/start/${conversationId}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      })
      const data = await res.json()
      hideTyping()

      if (data.messages && data.messages.length > 0) {
        // Load existing conversation
        data.messages.forEach(msg => addMessage(msg.role, msg.content))
      } else {
        addMessage('agent', data.message)
      }

      updateProgress(data.questions_asked || 0, data.max_questions || 5)

      if (data.completed) showCompleted()
      else {
        // Focus input
        setTimeout(() => document.getElementById('message-input')?.focus(), 300)
      }

    } catch(e) {
      hideTyping()
      addMessage('agent', 'Sorry, something went wrong. Please refresh and try again.')
    }
  }

  async function sendMessage() {
    if (isTyping || chatCompleted) return

    const input = document.getElementById('message-input')
    const message = input.value.trim()
    if (!message) return

    // Disable send button while processing
    document.getElementById('send-btn').disabled = true
    document.getElementById('send-btn').classList.add('opacity-50')

    input.value = ''
    input.style.height = 'auto'
    addMessage('candidate', message)

    isTyping = true
    showTyping()

    try {
      const res = await fetch(`/api/chat/message/${conversationId}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ message })
      })
      const data = await res.json()
      hideTyping()
      isTyping = false

      // Re-enable send button
      document.getElementById('send-btn').disabled = false
      document.getElementById('send-btn').classList.remove('opacity-50')

      addMessage('agent', data.message)
      updateProgress(data.questions_asked || 0, data.max_questions || 5)

      if (data.completed) {
        setTimeout(showCompleted, 1500)
      } else {
        document.getElementById('message-input')?.focus()
      }

    } catch(e) {
      hideTyping()
      isTyping = false
      document.getElementById('send-btn').disabled = false
      document.getElementById('send-btn').classList.remove('opacity-50')
      addMessage('agent', 'Sorry, something went wrong. Please try again.')
    }
  }

  initChat()
</script>
</body>
</html>
